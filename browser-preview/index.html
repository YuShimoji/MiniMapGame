<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MiniMapGame — Map Preview</title>
  <style>
    :root {
      --bg: #101514;
      --panel: rgba(20, 28, 30, 0.94);
      --panel-line: rgba(191, 179, 142, 0.16);
      --field: rgba(9, 13, 14, 0.85);
      --field-line: rgba(184, 173, 137, 0.22);
      --text: #ece7d8;
      --muted: #a9ab9b;
      --accent: #d28a52;
      --accent-strong: #e16d54;
      --status: rgba(17, 23, 24, 0.96);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(214, 185, 109, 0.08), transparent 36%),
        linear-gradient(180deg, #15201f 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      background: var(--panel);
      border-bottom: 1px solid var(--panel-line);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
      flex-wrap: wrap;
    }

    .toolbar label {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      font-size: 13px;
      padding: 6px 10px;
      border: 1px solid var(--field-line);
      border-radius: 8px;
      background: var(--field);
      color: var(--text);
    }

    .toolbar input[type="number"] { width: 100px; }

    .toolbar button {
      cursor: pointer;
      font-family: "Trebuchet MS", Verdana, sans-serif;
      letter-spacing: 0.01em;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }

    .toolbar button:hover {
      background: rgba(34, 46, 49, 0.96);
      border-color: rgba(215, 198, 148, 0.34);
      transform: translateY(-1px);
    }

    .toolbar button.primary {
      background: linear-gradient(180deg, var(--accent-strong), #b84d40);
      border-color: rgba(255, 213, 183, 0.28);
      color: #fff8f0;
    }

    .toolbar button.primary:hover {
      background: linear-gradient(180deg, #eb8466, #bf5143);
    }

    .toolbar .sep {
      width: 1px;
      height: 26px;
      background: var(--panel-line);
    }

    .toolbar .toggle {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .toolbar .toggle input {
      width: auto;
      accent-color: var(--accent);
    }

    .canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 18px;
      background:
        radial-gradient(circle at center, rgba(255, 226, 155, 0.04), transparent 48%),
        linear-gradient(180deg, rgba(8, 12, 12, 0.92), rgba(10, 13, 13, 1));
    }

    canvas {
      box-shadow: 0 26px 60px rgba(0, 0, 0, 0.38);
    }

    .status {
      padding: 6px 18px;
      font-size: 12px;
      background: var(--status);
      border-top: 1px solid var(--panel-line);
      color: var(--muted);
      font-family: "Trebuchet MS", Verdana, sans-serif;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <label>Seed</label>
    <input type="number" id="seed" value="42">
    <button id="btn-random" title="Random seed">Random</button>
    <div class="sep"></div>

    <label>Type</label>
    <select id="gen-type">
      <option value="Organic" selected>Organic</option>
      <option value="Grid">Grid</option>
      <option value="Mountain">Mountain</option>
      <option value="Rural">Rural</option>
    </select>
    <div class="sep"></div>

    <label>Theme</label>
    <select id="theme">
      <option value="Parchment" selected>Parchment</option>
      <option value="Dark">Dark</option>
    </select>
    <div class="sep"></div>

    <button id="btn-generate" class="primary">Generate</button>
    <div class="sep"></div>

    <div class="toggle">
      <input type="checkbox" id="opt-nodes"> <label for="opt-nodes">Nodes</label>
    </div>
    <div class="toggle">
      <input type="checkbox" id="opt-labels" checked> <label for="opt-labels">Labels</label>
    </div>
    <div class="toggle">
      <input type="checkbox" id="opt-grid"> <label for="opt-grid">Grid</label>
    </div>
    <div class="toggle">
      <input type="checkbox" id="opt-terrain" checked> <label for="opt-terrain">Terrain</label>
    </div>
    <div class="toggle">
      <input type="checkbox" id="opt-stats" checked> <label for="opt-stats">Stats</label>
    </div>
    <div class="sep"></div>
    <div class="toggle">
      <input type="checkbox" id="opt-forest" checked> <label for="opt-forest">Forest</label>
    </div>
    <div class="toggle">
      <input type="checkbox" id="opt-riparian" checked> <label for="opt-riparian">Riparian</label>
    </div>
    <div class="toggle">
      <input type="checkbox" id="opt-housing" checked> <label for="opt-housing">Housing</label>
    </div>
    <div class="sep"></div>
    <button id="btn-export" title="Save as PNG">Export PNG</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="map-canvas"></canvas>
  </div>

  <div class="status" id="status">Ready</div>

  <script src="map-gen.js"></script>
  <script src="observed-surface.js"></script>
  <script src="renderer.js"></script>
  <script>
    const canvas = document.getElementById('map-canvas');
    const seedInput = document.getElementById('seed');
    const genType = document.getElementById('gen-type');
    const statusEl = document.getElementById('status');

    let currentMap = null;

    function resizeCanvas() {
      const wrap = document.querySelector('.canvas-wrap');
      const maxW = wrap.clientWidth - 32;
      const maxH = wrap.clientHeight - 32;
      // Maintain map aspect ratio (860:580)
      const ratio = 860 / 580;
      let w, h;
      if (maxW / maxH > ratio) {
        h = maxH;
        w = h * ratio;
      } else {
        w = maxW;
        h = w / ratio;
      }
      canvas.width = Math.floor(w);
      canvas.height = Math.floor(h);
      if (currentMap) render();
    }

    function getOptions() {
      return {
        showNodes: document.getElementById('opt-nodes').checked,
        showLabels: document.getElementById('opt-labels').checked,
        showGrid: document.getElementById('opt-grid').checked,
        showTerrain: document.getElementById('opt-terrain').checked,
        showStats: document.getElementById('opt-stats').checked,
        showForest: document.getElementById('opt-forest').checked,
        showRiparian: document.getElementById('opt-riparian').checked,
        showHousing: document.getElementById('opt-housing').checked,
        theme: document.getElementById('theme').value,
      };
    }

    function render() {
      if (!currentMap) return;
      const t0 = performance.now();
      Renderer.renderMap(canvas, currentMap, getOptions());
      const dt = (performance.now() - t0).toFixed(1);
      statusEl.textContent = `Rendered in ${dt}ms | ${currentMap.nodes.length} nodes, ${currentMap.edges.length} edges, ${currentMap.buildings.length} buildings`;
    }

    function generate() {
      const seed = parseInt(seedInput.value) || 1;
      const type = genType.value;
      const t0 = performance.now();
      currentMap = MapGen.generateMap(seed, type);
      const genTime = (performance.now() - t0).toFixed(1);
      statusEl.textContent = `Generated in ${genTime}ms`;
      render();
    }

    // Event handlers
    document.getElementById('btn-generate').addEventListener('click', generate);

    document.getElementById('btn-random').addEventListener('click', () => {
      seedInput.value = Math.floor(Math.random() * 999999) + 1;
      generate();
    });

    document.getElementById('btn-export').addEventListener('click', () => {
      if (!currentMap) return;
      const link = document.createElement('a');
      link.download = `minimap-${currentMap.generatorType}-${currentMap.seed}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    // Re-render on toggle/theme changes
    ['opt-nodes', 'opt-labels', 'opt-grid', 'opt-terrain', 'opt-stats', 'opt-forest', 'opt-riparian', 'opt-housing', 'theme'].forEach(id => {
      document.getElementById(id).addEventListener('change', render);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); generate(); }
      if (e.key === 'r' || e.key === 'R') {
        seedInput.value = Math.floor(Math.random() * 999999) + 1;
        generate();
      }
    });

    // Init — read URL hash params
    const hashParams = new URLSearchParams(location.hash.slice(1));
    if (hashParams.has('type')) {
      const t = hashParams.get('type');
      if (MapGen.PRESETS[t]) genType.value = t;
    }
    if (hashParams.has('seed')) seedInput.value = hashParams.get('seed');

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    generate();
  </script>
</body>
</html>
